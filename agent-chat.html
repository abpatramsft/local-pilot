<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0d0f;
    --surface:   #141417;
    --border:    #222228;
    --accent:    #c8f135;
    --accent-dim:#8aaa22;
    --text:      #e8e8ec;
    --muted:     #55555f;
    --user-bg:   #1a1a20;
    --agent-bg:  #101013;
    --sidebar-w: 260px;
    --header-h:  52px;
    --font-ui:   'Syne', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-ui); }

  /* ── Layout ─────────────────────────────── */
  #app { display: flex; height: 100vh; }

  /* ── Sidebar ────────────────────────────── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .logo span { color: var(--muted); font-weight: 400; }

  #new-session-btn {
    margin-top: 12px;
    width: 100%;
    padding: 8px 12px;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 6px;
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  #new-session-btn:hover { background: #d9ff3f; }
  #new-session-btn:active { transform: scale(.97); }

  #sessions-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  #sessions-list::-webkit-scrollbar { width: 4px; }
  #sessions-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .session-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background .12s, border-color .12s;
    position: relative;
  }
  .session-item:hover { background: rgba(255,255,255,.03); }
  .session-item.active {
    background: rgba(200,241,53,.06);
    border-left-color: var(--accent);
  }

  .session-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background .12s;
  }
  .session-item.active .session-dot { background: var(--accent); }

  .session-label {
    flex: 1;
    font-size: 12.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--muted);
    transition: color .12s;
  }
  .session-item.active .session-label { color: var(--text); }

  .session-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 3px;
    transition: opacity .12s, color .12s;
  }
  .session-item:hover .session-delete { opacity: 1; }
  .session-delete:hover { color: #ff6b6b; }

  #sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .endpoint-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .endpoint-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background .3s;
  }
  .endpoint-dot.live { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  #endpoint-url {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    width: 100%;
    outline: none;
    cursor: text;
  }
  #endpoint-url:focus { color: var(--text); }

  /* ── Main Chat Area ─────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  #chat-header {
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #session-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .06em;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 500px;
  }

  #msg-count {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  /* ── Messages ───────────────────────────── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    padding: 14px 24px;
    display: flex;
    gap: 14px;
    animation: fadeUp .2s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { background: var(--user-bg); }
  .msg.agent { background: var(--agent-bg); }

  .msg-avatar {
    width: 26px; height: 26px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .05em;
    margin-top: 1px;
  }
  .msg.user .msg-avatar  { background: rgba(200,241,53,.15); color: var(--accent); }
  .msg.agent .msg-avatar { background: rgba(255,255,255,.06); color: var(--muted); }

  .msg-body { flex: 1; min-width: 0; }

  .msg-role {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .msg.user .msg-role  { color: var(--accent-dim); }
  .msg.agent .msg-role { color: var(--muted); }

  .msg-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    font-family: var(--font-mono);
  }

  /* Empty state */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 10px;
    text-align: center;
    padding: 40px;
  }
  .empty-icon { font-size: 36px; opacity: .3; }
  .empty-title { font-size: 14px; font-weight: 700; letter-spacing: .06em; }
  .empty-sub { font-size: 12px; font-family: var(--font-mono); }

  /* Thinking indicator */
  .thinking {
    padding: 14px 24px;
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .thinking-dots {
    display: flex; gap: 4px; padding: 2px 0;
  }
  .thinking-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
    animation: blink 1.2s infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: .2s; }
  .thinking-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: .2; }
    40%           { opacity: 1; }
  }

  /* ── Input Area ─────────────────────────── */
  #input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    transition: border-color .15s;
  }
  #input-wrap:focus-within { border-color: var(--accent); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13.5px;
    line-height: 1.6;
    resize: none;
    max-height: 160px;
    overflow-y: auto;
    scrollbar-width: none;
  }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 34px; height: 34px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .15s, transform .1s, opacity .15s;
  }
  #send-btn:hover { background: #d9ff3f; }
  #send-btn:active { transform: scale(.92); }
  #send-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 15px; height: 15px; fill: #0d0d0f; }

  .hint { font-size: 11px; color: var(--muted); margin-top: 8px; text-align: right; font-family: var(--font-mono); }

  /* Error toast */
  #error-toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2a0f0f;
    border: 1px solid #5a1e1e;
    color: #ff9090;
    font-size: 12px;
    font-family: var(--font-mono);
    padding: 10px 18px;
    border-radius: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 100;
    white-space: nowrap;
  }
  #error-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* No session selected */
  #no-session {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 12px;
  }
  .no-session-icon { font-size: 42px; opacity: .2; }
  .no-session-text { font-size: 13px; font-family: var(--font-mono); }

  /* Tool execution events */
  .tool-event {
    padding: 8px 24px 8px 64px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    animation: fadeUp .15s ease both;
  }
  .tool-event.start {
    color: #7eb8da;
    background: rgba(126, 184, 218, 0.05);
  }
  .tool-event.complete {
    color: #7ed87e;
    background: rgba(126, 216, 126, 0.05);
  }
  .tool-event.error {
    color: #ff9090;
    background: rgba(255, 144, 144, 0.05);
  }
  .tool-icon {
    font-size: 12px;
  }
  .tool-name {
    font-weight: 600;
  }
  .tool-args {
    color: var(--muted);
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Streaming message */
  .msg.streaming .msg-text {
    border-right: 2px solid var(--accent);
    animation: cursor-blink 1s infinite;
  }
  @keyframes cursor-blink {
    0%, 50% { border-color: var(--accent); }
    51%, 100% { border-color: transparent; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ── -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="logo">Agent<span>/chat</span></div>
      <button id="new-session-btn" onclick="newSession()">+ New Session</button>
    </div>
    <div id="sessions-list"></div>
    <div id="sidebar-footer">
      <div class="endpoint-badge">
        <div class="endpoint-dot" id="endpoint-dot"></div>
        <span>agent endpoint</span>
      </div>
      <input id="endpoint-url" type="text" value="https://lyle-unhectored-myron.ngrok-free.dev/chat" spellcheck="false" title="Edit agent endpoint URL" />
    </div>
  </aside>

  <!-- ── Main ── -->
  <main id="main">
    <div id="chat-header">
      <div id="session-title">—</div>
      <div id="msg-count"></div>
    </div>

    <div id="messages"></div>

    <div id="input-area">
      <div id="input-wrap">
        <textarea id="user-input" rows="1" placeholder="Message the agent…" disabled></textarea>
        <button id="send-btn" disabled onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for newline</div>
    </div>
  </main>
</div>

<div id="error-toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let sessions = JSON.parse(localStorage.getItem('agent_sessions') || '[]');
  let activeId = null;

  // ── Persistence ────────────────────────────────────────────────────────────
  function save() {
    localStorage.setItem('agent_sessions', JSON.stringify(sessions));
  }

  function getSession(id) {
    return sessions.find(s => s.id === id);
  }

  // ── Session Management ─────────────────────────────────────────────────────
  function newSession() {
    const id = 'sess_' + Date.now();
    const label = 'Session ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    sessions.unshift({ id, label, messages: [] });
    save();
    renderSidebar();
    selectSession(id);
  }

  function deleteSession(id, e) {
    e.stopPropagation();
    sessions = sessions.filter(s => s.id !== id);
    save();
    if (activeId === id) {
      activeId = null;
      renderChat(null);
    }
    renderSidebar();
  }

  function selectSession(id) {
    activeId = id;
    renderSidebar();
    renderChat(getSession(id));
  }

  // ── Sidebar Render ─────────────────────────────────────────────────────────
  function renderSidebar() {
    const list = document.getElementById('sessions-list');
    if (sessions.length === 0) {
      list.innerHTML = `<div style="padding:20px 16px;font-size:12px;color:var(--muted);font-family:var(--font-mono)">No sessions yet.<br>Hit + New Session.</div>`;
      return;
    }
    list.innerHTML = sessions.map(s => `
      <div class="session-item ${s.id === activeId ? 'active' : ''}" onclick="selectSession('${s.id}')">
        <div class="session-dot"></div>
        <div class="session-label" title="${s.label}">${s.label}</div>
        <button class="session-delete" onclick="deleteSession('${s.id}', event)" title="Delete">×</button>
      </div>
    `).join('');
  }

  // ── Chat Render ────────────────────────────────────────────────────────────
  function renderChat(session) {
    const messagesEl = document.getElementById('messages');
    const titleEl    = document.getElementById('session-title');
    const countEl    = document.getElementById('msg-count');
    const input      = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');

    if (!session) {
      titleEl.textContent = '—';
      countEl.textContent = '';
      input.disabled = true;
      sendBtn.disabled = true;
      messagesEl.innerHTML = `
        <div id="no-session">
          <div class="no-session-icon">◎</div>
          <div class="no-session-text">Select or create a session to begin</div>
        </div>`;
      return;
    }

    titleEl.textContent = session.label;
    countEl.textContent = session.messages.length ? session.messages.length + ' msg' : '';
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();

    if (session.messages.length === 0) {
      messagesEl.innerHTML = `
        <div id="empty-state">
          <div class="empty-icon">⬡</div>
          <div class="empty-title">Session ready</div>
          <div class="empty-sub">Say something to start the conversation</div>
        </div>`;
      return;
    }

    messagesEl.innerHTML = session.messages.map(m => msgHTML(m)).join('');
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function msgHTML({ role, text }) {
    const isUser = role === 'user';
    return `
      <div class="msg ${role}">
        <div class="msg-avatar">${isUser ? 'YOU' : 'AI'}</div>
        <div class="msg-body">
          <div class="msg-role">${isUser ? 'You' : 'Agent'}</div>
          <div class="msg-text">${escapeHtml(text)}</div>
        </div>
      </div>`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function appendMessage(role, text) {
    const session = getSession(activeId);
    session.messages.push({ role, text });

    // update session label from first user message
    if (role === 'user' && session.messages.filter(m => m.role === 'user').length === 1) {
      session.label = text.slice(0, 36) + (text.length > 36 ? '…' : '');
      renderSidebar();
    }

    const countEl = document.getElementById('msg-count');
    countEl.textContent = session.messages.length + ' msg';

    const messagesEl = document.getElementById('messages');
    const empty = messagesEl.querySelector('#empty-state');
    if (empty) empty.remove();

    const el = document.createElement('div');
    el.innerHTML = msgHTML({ role, text });
    messagesEl.appendChild(el.firstElementChild);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    save();
  }

  function showThinking() {
    const messagesEl = document.getElementById('messages');
    const el = document.createElement('div');
    el.id = 'thinking';
    el.className = 'thinking';
    el.innerHTML = `
      <div class="msg-avatar" style="background:rgba(255,255,255,.06);color:var(--muted);width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0">AI</div>
      <div class="thinking-dots"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideThinking() {
    document.getElementById('thinking')?.remove();
  }

  // ── Tool Event HTML ────────────────────────────────────────────────────────
  function toolEventHTML(type, tool, args) {
    if (type === 'tool_start') {
      const argsStr = args ? JSON.stringify(args).slice(0, 80) : '';
      return `
        <div class="tool-event start">
          <span class="tool-icon">🔧</span>
          <span class="tool-name">${escapeHtml(tool)}</span>
          ${argsStr ? `<span class="tool-args">${escapeHtml(argsStr)}</span>` : ''}
        </div>`;
    } else if (type === 'tool_complete') {
      return `
        <div class="tool-event complete">
          <span class="tool-icon">✓</span>
          <span class="tool-name">${escapeHtml(tool)}</span>
          <span>done</span>
        </div>`;
    }
    return '';
  }

  // ── Streaming Message ──────────────────────────────────────────────────────
  function createStreamingMessage() {
    const messagesEl = document.getElementById('messages');
    const empty = messagesEl.querySelector('#empty-state');
    if (empty) empty.remove();

    const el = document.createElement('div');
    el.className = 'msg agent streaming';
    el.id = 'streaming-msg';
    el.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="msg-role">Agent</div>
        <div class="msg-text"></div>
      </div>`;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  function appendToStreamingMessage(content) {
    const el = document.getElementById('streaming-msg');
    if (el) {
      const textEl = el.querySelector('.msg-text');
      textEl.textContent += content;
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
  }

  function finalizeStreamingMessage(fullContent) {
    const el = document.getElementById('streaming-msg');
    if (el) {
      el.classList.remove('streaming');
      el.id = '';
      
      // Save to session
      const session = getSession(activeId);
      session.messages.push({ role: 'agent', text: fullContent });
      
      const countEl = document.getElementById('msg-count');
      countEl.textContent = session.messages.length + ' msg';
      save();
    }
  }

  function appendToolEvent(type, tool, args) {
    const messagesEl = document.getElementById('messages');
    const html = toolEventHTML(type, tool, args);
    if (html) {
      const el = document.createElement('div');
      el.innerHTML = html;
      messagesEl.appendChild(el.firstElementChild);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }

  // ── Send Message ───────────────────────────────────────────────────────────
  async function sendMessage() {
    const input   = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const text    = input.value.trim();
    if (!text || !activeId) return;

    const session = getSession(activeId);
    const endpoint = document.getElementById('endpoint-url').value.trim();
    const streamEndpoint = endpoint.replace('/chat', '/chat/stream');

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    input.disabled = true;

    appendMessage('user', text);

    try {
      const res = await fetch(streamEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          history: session.messages.slice(0, -1)
        })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let streamingStarted = false;
      let fullContent = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const event = JSON.parse(line.slice(6));

              if (event.type === 'delta') {
                if (!streamingStarted) {
                  streamingStarted = true;
                  createStreamingMessage();
                }
                fullContent += event.content;
                appendToStreamingMessage(event.content);
              }
              else if (event.type === 'tool_start') {
                appendToolEvent('tool_start', event.tool, event.args);
              }
              else if (event.type === 'tool_complete') {
                appendToolEvent('tool_complete', event.tool);
              }
              else if (event.type === 'error') {
                showError(event.message);
              }
              else if (event.type === 'done') {
                if (!streamingStarted && event.content) {
                  // Non-streaming fallback
                  appendMessage('agent', event.content);
                } else {
                  finalizeStreamingMessage(fullContent);
                }
              }
            } catch (e) {
              // Skip malformed JSON
            }
          }
        }
      }

      pingEndpoint();

    } catch (err) {
      showError(err.message.includes('Failed to fetch')
        ? 'Cannot reach agent — is Flask running?'
        : 'Error: ' + err.message);
    } finally {
      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
    }
  }

  // ── Error Toast ────────────────────────────────────────────────────────────
  let toastTimer;
  function showError(msg) {
    const toast = document.getElementById('error-toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
  }

  // ── Endpoint Live Indicator ────────────────────────────────────────────────
  async function pingEndpoint() {
    const dot = document.getElementById('endpoint-dot');
    const url = document.getElementById('endpoint-url').value.trim();
    try {
      await fetch(url.replace('/chat', '/health') , { method: 'GET', signal: AbortSignal.timeout(2000) });
      dot.classList.add('live');
    } catch {
      dot.classList.remove('live');
    }
  }

  // ── Keyboard Handler ───────────────────────────────────────────────────────
  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  document.getElementById('user-input').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 160) + 'px';
  });

  // Re-ping when endpoint URL is edited
  document.getElementById('endpoint-url').addEventListener('change', pingEndpoint);

  // ── Init ───────────────────────────────────────────────────────────────────
  renderSidebar();
  renderChat(null);
  pingEndpoint();
  setInterval(pingEndpoint, 30000); // ping every 30s
</script>
</body>
</html>
