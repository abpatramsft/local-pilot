<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Agent Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:            #0c0e14;
    --sidebar-bg:    #10121a;
    --sidebar-border:#1e2130;
    --surface:       #161926;
    --surface-2:     #1c2035;
    --border:        #1e2336;
    --border-2:      #252a40;

    --blue:          #4b7cf3;
    --blue-dim:      #2a4db5;
    --blue-glow:     rgba(75,124,243,.13);

    --tool-name:     #6b9cf8;
    --tool-args:     #3d4b6a;
    --tool-dot:      #3a4f7a;

    --green:         #48bb78;
    --red:           #fc8181;

    --text:          #d8dce8;
    --text-2:        #7b8299;
    --text-3:        #363c52;

    --sidebar-w:     268px;
    --header-h:      50px;
    --font:          'JetBrains Mono', monospace;

    --safe-top:      env(safe-area-inset-top,    0px);
    --safe-bottom:   env(safe-area-inset-bottom, 0px);
    --safe-left:     env(safe-area-inset-left,   0px);
  }

  html, body { height: 100%; height: 100dvh; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

  /* ══ Layout ═══════════════════════════════════ */
  #app { display: flex; height: 100vh; height: 100dvh; position: relative; overflow: hidden; }

  /* ══ Sidebar ══════════════════════════════════ */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--sidebar-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 30;
    transition: transform .25s cubic-bezier(.4,0,.2,1);
    padding-left: var(--safe-left);
  }

  #sidebar-header {
    padding: 16px 14px 14px;
    padding-top: calc(16px + var(--safe-top));
    border-bottom: 1px solid var(--sidebar-border);
    flex-shrink: 0;
  }

  .logo { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }

  .logo-circle {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--blue);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 12px rgba(75,124,243,.4);
  }
  .logo-circle svg { width: 13px; height: 13px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; }

  .logo-wordmark { font-size: 13.5px; font-weight: 600; color: var(--text); letter-spacing: .01em; }
  .logo-wordmark span { color: var(--text-2); font-weight: 400; }

  #new-session-btn {
    width: 100%; padding: 9px 14px; min-height: 44px;
    background: var(--blue); color: #fff;
    border: none; border-radius: 7px;
    font-family: var(--font); font-size: 12px; font-weight: 600; letter-spacing: .02em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: background .15s, transform .1s;
  }
  #new-session-btn:hover  { background: #3d6be8; }
  #new-session-btn:active { transform: scale(.97); }

  #fetch-local-btn {
    margin-top: 7px; width: 100%; padding: 8px 14px; min-height: 44px;
    background: transparent; color: var(--text-2);
    border: 1px solid var(--border-2); border-radius: 7px;
    font-family: var(--font); font-size: 11.5px; font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: border-color .15s, color .15s, background .15s;
  }
  #fetch-local-btn:hover   { border-color: var(--blue); color: var(--blue); background: var(--blue-glow); }
  #fetch-local-btn:active  { transform: scale(.97); }
  #fetch-local-btn:disabled { opacity: .35; cursor: not-allowed; }

  #sessions-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 6px 0; }

  .section-label {
    padding: 12px 14px 4px;
    font-size: 9px; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
    color: var(--text-3);
  }

  .session-item {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 14px; min-height: 44px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .session-item:hover  { background: rgba(255,255,255,.025); }
  .session-item.active { background: var(--blue-glow); border-left-color: var(--blue); }

  .session-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--border-2); flex-shrink: 0;
    transition: background .12s;
  }
  .session-item.active .session-dot { background: var(--blue); box-shadow: 0 0 5px var(--blue); }

  .session-label {
    flex: 1; font-size: 12.5px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text-2); transition: color .12s;
  }
  .session-item.active .session-label { color: var(--text); }

  .session-delete {
    background: none; border: none; color: var(--text-3);
    cursor: pointer; font-size: 17px; line-height: 1;
    padding: 3px 5px; border-radius: 4px; opacity: 0;
    min-width: 28px; min-height: 28px;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .12s, color .12s, background .12s;
  }
  .session-item:hover .session-delete { opacity: 1; }
  .session-delete:hover { color: var(--red); background: rgba(252,129,129,.1); }

  #local-sessions-container {
    border-top: 1px solid var(--sidebar-border);
    flex-shrink: 0; max-height: 45%;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }

  .local-item {
    display: flex; flex-direction: column; justify-content: center;
    padding: 9px 14px; min-height: 50px; cursor: pointer;
    border-left: 2px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .local-item:hover  { background: rgba(255,255,255,.025); }
  .local-item.active { background: var(--blue-glow); border-left-color: var(--blue); }

  .local-summary {
    font-size: 12px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text-2);
  }
  .local-item.active .local-summary { color: var(--text); }
  .local-meta { font-size: 9.5px; color: var(--text-3); margin-top: 2px; }

  #sidebar-footer {
    padding: 12px 14px;
    padding-bottom: calc(12px + var(--safe-bottom));
    border-top: 1px solid var(--sidebar-border);
    background: var(--sidebar-bg); flex-shrink: 0;
  }

  .ep-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .ep-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-3); flex-shrink: 0;
    transition: background .3s, box-shadow .3s;
  }
  .ep-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .ep-lbl { font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-3); }

  #endpoint-url {
    background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text-2); font-family: var(--font);
    font-size: 16px; /* ≥16px to prevent iOS zoom */
    width: 100%; outline: none; padding: 5px 7px; margin-top: 3px;
    transform: scale(.75); transform-origin: left top;
    width: 133.33%; margin-bottom: -9px;
    transition: border-color .15s;
  }
  #endpoint-url:focus { border-color: var(--blue); color: var(--text); }

  /* ══ Main ═════════════════════════════════════ */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); min-width: 0; }

  /* ══ Header ═══════════════════════════════════ */
  #chat-header {
    display: flex; align-items: center; gap: 10px;
    padding: 0 22px; padding-top: var(--safe-top);
    height: calc(var(--header-h) + var(--safe-top));
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; background: var(--bg);
    position: relative; z-index: 10;
  }

  #menu-btn {
    display: none; background: none; border: none; color: var(--text-2);
    cursor: pointer; padding: 6px; border-radius: 5px;
    min-width: 40px; min-height: 40px;
    align-items: center; justify-content: center;
    transition: background .12s, color .12s; flex-shrink: 0;
  }
  #menu-btn:hover { background: rgba(255,255,255,.05); color: var(--text); }

  #session-title {
    flex: 1; font-size: 13px; font-weight: 600;
    color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0;
  }

  #msg-count { font-size: 11px; color: var(--text-3); flex-shrink: 0; white-space: nowrap; }

  .header-config { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 1px; }
  .hcfg-pill {
    font-size: 10px; padding: 2px 8px; border-radius: 4px; white-space: nowrap;
  }
  .hcfg-pill.agent { background: rgba(75,124,243,.12); color: #6b9cf8; border: 1px solid rgba(75,124,243,.2); }
  .hcfg-pill.skill { background: rgba(72,187,120,.1);  color: var(--green); border: 1px solid rgba(72,187,120,.2); }
  .hcfg-pill.mcp   { background: rgba(236,153,75,.1);  color: #ec994b; border: 1px solid rgba(236,153,75,.2); }

  /* ══ Messages ═════════════════════════════════ */
  #messages {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 18px 0 6px;
    display: flex; flex-direction: column;
    scroll-behavior: smooth;
  }

  .msg {
    display: flex; gap: 14px;
    padding: 14px 22px;
    animation: fadeUp .18s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user  { background: rgba(75,124,243,.04); }
  .msg.agent { background: transparent; }

  .msg-avatar {
    width: 32px; height: 20px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; letter-spacing: .06em;
    flex-shrink: 0; margin-top: 2px; text-transform: uppercase;
  }
  .msg.user  .msg-avatar { background: var(--blue); color: #fff; }
  .msg.agent .msg-avatar {
    background: var(--surface); border: 1px solid var(--border-2);
    color: var(--text-2); width: 26px;
  }

  .msg-body { flex: 1; min-width: 0; }

  .msg-role {
    font-size: 9.5px; font-weight: 600;
    letter-spacing: .12em; text-transform: uppercase;
    margin-bottom: 6px; color: var(--text-3);
  }
  .msg.user .msg-role { color: #4a6bb5; }

  .msg-text {
    font-size: 13.5px; line-height: 1.72;
    color: var(--text); white-space: pre-wrap;
    word-break: break-word; font-weight: 400;
  }

  /* ══ Tool Events ══════════════════════════════
     Exact format from screenshot:
       ◉  toolname  {"path":"...","key":"val",...}
     tool-name = bold blue, args = dark grey
     indented so text aligns with message body
  ══════════════════════════════════════════════ */
  .tool-event {
    display: flex;
    align-items: baseline;
    gap: 7px;
    padding: 3px 22px 3px 72px;
    font-family: var(--font);
    font-size: 11.5px;
    line-height: 1.5;
    animation: fadeUp .12s ease both;
  }

  .tool-bullet { color: var(--tool-dot); font-size: 10px; flex-shrink: 0; line-height: 1.6; }
  .tool-name   { color: var(--tool-name); font-weight: 600; flex-shrink: 0; }
  .tool-args   { color: var(--tool-args); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }

  .tool-event.complete .tool-bullet { color: var(--green); }
  .tool-event.complete .tool-name   { color: var(--green); }
  .tool-event.complete .tool-args   { color: var(--text-3); }

  .tool-event.error .tool-bullet { color: var(--red); }
  .tool-event.error .tool-name   { color: var(--red); }
  .tool-event.error .tool-args   { color: var(--red); opacity: .7; }

  /* ══ Thinking ═════════════════════════════════ */
  .thinking { display: flex; gap: 14px; padding: 14px 22px; align-items: center; }
  .thinking-dots { display: flex; gap: 4px; }
  .thinking-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-3);
    animation: blink 1.2s infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: .2s; }
  .thinking-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2;} 40%{opacity:1;} }

  .msg.streaming .msg-text::after {
    content: '▋'; color: var(--blue);
    animation: bcur .7s infinite; margin-left: 1px;
  }
  @keyframes bcur { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }

  /* empty / no-session */
  #empty-state, #no-session {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; text-align: center; padding: 40px 24px; color: var(--text-3);
  }
  .empty-icon  { font-size: 28px; opacity: .18; }
  .empty-title { font-size: 13px; font-weight: 600; color: var(--text-2); }
  .empty-sub   { font-size: 11px; color: var(--text-3); }

  .resumed-banner {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 22px;
    background: rgba(75,124,243,.06);
    border-bottom: 1px solid rgba(75,124,243,.12);
    font-size: 11px; color: #6b9cf8;
  }

  /* ══ Input Area ═══════════════════════════════ */
  #input-area {
    padding: 10px 18px 14px;
    padding-bottom: calc(14px + var(--safe-bottom));
    border-top: 1px solid var(--border);
    flex-shrink: 0; background: var(--bg);
    position: relative; z-index: 10;
  }

  #config-bar { display: none; align-items: center; gap: 6px; padding: 0 0 9px; flex-wrap: wrap; }

  .cfg-sel { position: relative; }

  .cfg-trigger {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 11px; min-height: 34px;
    background: var(--surface); border: 1px solid var(--border-2); border-radius: 6px;
    color: var(--text-2); font-family: var(--font); font-size: 11.5px;
    cursor: pointer; white-space: nowrap;
    transition: border-color .15s, color .15s, background .15s;
  }
  .cfg-trigger:hover  { border-color: var(--blue); color: var(--blue); background: var(--blue-glow); }
  .cfg-trigger.active { border-color: var(--blue); color: var(--blue); background: var(--blue-glow); }
  .cfg-trigger.locked { opacity: .4; cursor: default; }

  .cfg-count {
    background: var(--blue); color: #fff;
    font-size: 9px; font-weight: 700;
    padding: 1px 5px; border-radius: 8px;
    min-width: 16px; text-align: center;
  }

  .cfg-dd {
    display: none; position: absolute;
    bottom: calc(100% + 6px); left: 0;
    min-width: 275px; max-width: calc(100vw - 32px); max-height: 250px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    background: var(--surface); border: 1px solid var(--border-2); border-radius: 9px;
    box-shadow: 0 -8px 32px rgba(0,0,0,.55); z-index: 60; padding: 4px;
  }
  .cfg-dd.open { display: block; }

  .cfg-dd-hdr {
    padding: 7px 10px 5px;
    font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-3); border-bottom: 1px solid var(--border); margin-bottom: 3px;
  }

  .cfg-opt {
    display: flex; align-items: flex-start; gap: 9px;
    padding: 9px 10px; border-radius: 6px; cursor: pointer; min-height: 44px;
    transition: background .1s;
  }
  .cfg-opt:hover  { background: rgba(255,255,255,.04); }
  .cfg-opt.sel    { background: var(--blue-glow); }
  .cfg-opt.locked { opacity: .4; cursor: default; }

  .cfg-chk {
    width: 15px; height: 15px; border: 1.5px solid var(--border-2); border-radius: 3px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    margin-top: 2px; font-size: 10px; color: transparent; transition: all .12s;
  }
  .cfg-opt.sel .cfg-chk { border-color: var(--blue); background: var(--blue); color: #fff; }

  .cfg-info { flex: 1; min-width: 0; }
  .cfg-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .cfg-desc {
    font-size: 10.5px; color: var(--text-3); margin-top: 2px; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .cfg-empty { padding: 14px; font-size: 11px; color: var(--text-3); text-align: center; }

  .cfg-pills { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
  .cfg-pill {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; white-space: nowrap;
  }
  .cfg-pill.agent { background: rgba(75,124,243,.12); border: 1px solid rgba(75,124,243,.25); color: #6b9cf8; }
  .cfg-pill.skill { background: rgba(72,187,120,.1);  border: 1px solid rgba(72,187,120,.2);  color: var(--green); }
  .cfg-pill.mcp   { background: rgba(236,153,75,.1);  border: 1px solid rgba(236,153,75,.25); color: #ec994b; }
  .cfg-pill .px { opacity: .5; cursor: pointer; font-size: 13px; transition: opacity .12s; }
  .cfg-pill .px:hover { opacity: 1; }
  .cfg-pill.locked .px { display: none; }

  #input-wrap {
    display: flex; align-items: flex-end; gap: 9px;
    background: var(--surface); border: 1px solid var(--border-2); border-radius: 9px;
    padding: 9px 11px;
    transition: border-color .15s, box-shadow .15s;
  }
  #input-wrap:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(75,124,243,.1); }

  #user-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: var(--font);
    font-size: 16px; font-weight: 400; line-height: 1.55;
    resize: none; max-height: 120px;
    overflow-y: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
  }
  #user-input::placeholder { color: var(--text-3); }

  #send-btn {
    width: 34px; height: 34px; min-width: 44px; min-height: 44px;
    background: var(--blue); border: none; border-radius: 7px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .15s, transform .1s, opacity .15s;
    box-shadow: 0 2px 10px rgba(75,124,243,.3);
  }
  #send-btn:hover   { background: #3d6be8; }
  #send-btn:active  { transform: scale(.92); }
  #send-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; box-shadow: none; }
  #send-btn svg { width: 14px; height: 14px; fill: #fff; }

  .input-hint { font-size: 10px; color: var(--text-3); margin-top: 7px; text-align: right; }

  #error-toast {
    position: fixed; bottom: calc(85px + var(--safe-bottom)); left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #1a0a0a; border: 1px solid rgba(252,129,129,.3);
    color: var(--red); font-size: 11.5px; padding: 9px 16px; border-radius: 8px;
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
    z-index: 200; max-width: calc(100vw - 32px);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  #error-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.72); z-index: 25; opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  #sidebar-overlay.on { opacity: 1; pointer-events: auto; }

  /* ══ Mobile ≤768px ════════════════════════════ */
  @media (max-width: 768px) {
    #menu-btn { display: flex; }

    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      transform: translateX(-100%);
      box-shadow: 4px 0 40px rgba(0,0,0,.6);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar-overlay { display: block; }
    #main { width: 100%; }

    #chat-header { padding: 0 12px; padding-top: var(--safe-top); }
    .msg        { padding: 12px 14px; }
    .tool-event { padding: 3px 14px 3px 56px; }
    .thinking   { padding: 12px 14px; }
    #input-area { padding: 9px 12px; padding-bottom: calc(9px + var(--safe-bottom)); }

    .session-delete { opacity: 1 !important; }
    #msg-count   { display: none; }
    .input-hint  { display: none; }
    .tool-args   { max-width: 160px; }
  }

  @media (max-width: 380px) {
    .msg-text   { font-size: 13px; }
    .tool-event { font-size: 10.5px; }
  }

  @media (min-width: 1200px) {
    :root { --sidebar-w: 285px; }
    #chat-header { padding: 0 28px; padding-top: var(--safe-top); }
    .msg        { padding: 16px 28px; }
    .tool-event { padding: 3px 28px 3px 82px; }
    .thinking   { padding: 16px 28px; }
    #input-area { padding: 12px 28px 16px; padding-bottom: calc(16px + var(--safe-bottom)); }
  }
</style>
</head>
<body>
<div id="app">

  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <aside id="sidebar">

             value="https://lyle-unhectored-myron.ngrok-free.dev/chat"
             spellcheck="false" autocomplete="off" />

  <main id="main">
    <div id="chat-header">

          <line x1="3" y1="6"  x2="21" y2="6"/>

    <div id="messages"></div>

            <div class="cfg-dd-hdr">Skills</div>

          </div>

            <span class="cfg-count" id="skill-count" style="display:none">0</span>
          </button>

          <div class="cfg-dd" id="mcp-dd">
            <div class="cfg-dd-hdr">MCP Servers</div>
            <div id="mcp-opts"></div>
          </div>
          <button class="cfg-trigger" onclick="toggleDD('mcp')">
            <span>⚡ MCPs</span>
            <span class="cfg-count" id="mcp-count" style="display:none">0</span>
          </button>
        </div>
        <div class="cfg-pills" id="cfg-pills"></div>
      </div>

      <div id="input-wrap">
        <textarea id="user-input" rows="1" placeholder="Message the agent…" disabled></textarea>
        <button id="send-btn" onclick="sendMessage()" disabled aria-label="Send">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>

    </div>

</div>

<div id="error-toast" role="alert"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let sessions        = JSON.parse(localStorage.getItem('ac2_sessions') || '[]');
let activeId        = null;
let localSessions   = [];
let activeLocalId   = null;
let availableAgents = [];
let availableSkills = [];
let availableMcps   = [];

const save    = () => localStorage.setItem('ac2_sessions', JSON.stringify(sessions));
const getSess = id  => sessions.find(s => s.id === id);
const isTouch = ()  => 'ontouchstart' in window || navigator.maxTouchPoints > 0;
const esc     = s   => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── Sidebar ───────────────────────────────────────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('on');
  document.body.style.overflow = '';
}
// swipe-left to dismiss
!(function() {
  let x0 = 0;
  const sb = document.getElementById('sidebar');
  sb.addEventListener('touchstart', e => { x0 = e.touches[0].clientX; }, { passive: true });
  sb.addEventListener('touchend',   e => { if (x0 - e.changedTouches[0].clientX > 55) closeSidebar(); }, { passive: true });
})();

// ── Sessions ──────────────────────────────────────────────────────────────────
function newSession() {
  const id    = 'sess_' + Date.now();
  const label = 'Session ' + new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  sessions.unshift({ id, label, messages: [], agents: [], skills: [], mcps: [], configLocked: false });
  save(); renderSidebar(); selectSession(id);
}

function deleteSession(id, e) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  save();
  if (activeId === id) { activeId = null; renderChat(null); }
  renderSidebar();
}

function selectSession(id) {
  activeId = id; activeLocalId = null;
  renderSidebar(); renderLocalSessions(); renderChat(getSess(id)); renderConfigBar();
  closeSidebar();
}

function renderSidebar() {
  const el = document.getElementById('sessions-list');
  if (!sessions.length) {
    el.innerHTML = `<div style="padding:18px 14px;font-size:11.5px;color:var(--text-3);line-height:1.7">No sessions yet.<br>Hit + New Session to begin.</div>`;
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id===activeId?'active':''}" onclick="selectSession('${s.id}')">
      <div class="session-dot"></div>
      <div class="session-label" title="${esc(s.label)}">${esc(s.label)}</div>
      <button class="session-delete" onclick="deleteSession('${s.id}',event)" aria-label="Delete">×</button>
    </div>`).join('');
}

// ── Chat ──────────────────────────────────────────────────────────────────────
function renderChat(session) {
  const msgs   = document.getElementById('messages');
  const title  = document.getElementById('session-title');
  const count  = document.getElementById('msg-count');
  const input  = document.getElementById('user-input');
  const btn    = document.getElementById('send-btn');
  const cfgBar = document.getElementById('config-bar');
  const hcfg   = document.getElementById('session-config');

  if (!session) {
    title.textContent = '—'; count.textContent = '';
    hcfg.innerHTML = ''; input.disabled = true; btn.disabled = true; cfgBar.style.display = 'none';
    msgs.innerHTML = `<div id="no-session"><div class="empty-icon">◎</div><div class="empty-sub">Select or create a session to begin</div></div>`;
    return;
  }

  title.textContent = session.label;
  count.textContent = session.messages.length ? session.messages.length + ' msg' : '';
  input.disabled = false; btn.disabled = false; cfgBar.style.display = 'flex';
  renderHeaderConfig(session);

  if (!session.messages.length) {
    msgs.innerHTML = `<div id="empty-state"><div class="empty-icon">⬡</div><div class="empty-title">Session ready</div><div class="empty-sub">Say something to start the conversation</div></div>`;
    if (!isTouch()) input.focus();
    return;
  }

  let html = session.resumedFrom
    ? `<div class="resumed-banner"><span>📂</span><span>Resumed from local session — send a message to continue.</span></div>`
    : '';
  msgs.innerHTML = html + session.messages.map(m => msgHTML(m)).join('');
  msgs.scrollTop = msgs.scrollHeight;
  if (!isTouch()) input.focus();
}

function msgHTML({ role, text }) {
  const u = role === 'user';
  return `<div class="msg ${role}">
    <div class="msg-avatar">${u ? 'YOU' : 'AI'}</div>
    <div class="msg-body">
      <div class="msg-role">${u ? 'You' : 'Agent'}</div>
      <div class="msg-text">${esc(text)}</div>
    </div>
  </div>`;
}

function appendMessage(role, text) {
  const s = getSess(activeId);
  s.messages.push({ role, text });
  if (role === 'user' && s.messages.filter(m => m.role==='user').length === 1) {
    s.label = text.slice(0,36) + (text.length>36 ? '…':'');
    renderSidebar();
  }
  document.getElementById('msg-count').textContent = s.messages.length + ' msg';
  const msgs = document.getElementById('messages');
  msgs.querySelector('#empty-state')?.remove();
  const el = document.createElement('div');
  el.innerHTML = msgHTML({ role, text });
  msgs.appendChild(el.firstElementChild);
  msgs.scrollTop = msgs.scrollHeight;
  save();
}

// ── Thinking ──────────────────────────────────────────────────────────────────
function showThinking() {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.id = 'thinking'; el.className = 'thinking';
  el.innerHTML = `
    <div class="msg-avatar" style="background:var(--surface);border:1px solid var(--border-2);color:var(--text-2)">AI</div>
    <div class="thinking-dots"><span></span><span></span><span></span></div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideThinking() { document.getElementById('thinking')?.remove(); }

// ── Tool Events ── pixel-faithful to the screenshot ───────────────────────────
// Renders:  ◉  toolname  {"path":"C:\\Users\\...","key":"val",...}
// tool-name = bold blue (#6b9cf8), args = muted dark grey, bullet = dim blue
// No background — plain indented rows, exactly as in screenshot
function toolEventHTML(type, tool, args) {
  let argsStr = '';
  if (args !== null && args !== undefined) {
    try { argsStr = typeof args === 'string' ? args : JSON.stringify(args); }
    catch(e) { argsStr = String(args); }
    // Truncate but keep it readable — match screenshot which shows ~60 chars
    if (argsStr.length > 120) argsStr = argsStr.slice(0, 117) + '...';
  }

  const argsSpan = argsStr ? `<span class="tool-args">${esc(argsStr)}</span>` : '';

  if (type === 'tool_start') {
    return `<div class="tool-event start">
      <span class="tool-bullet">◉</span>
      <span class="tool-name">${esc(tool)}</span>
      ${argsSpan}
    </div>`;
  }
  if (type === 'tool_complete') {
    return `<div class="tool-event complete">
      <span class="tool-bullet">✓</span>
      <span class="tool-name">${esc(tool)}</span>
      ${argsSpan || '<span class="tool-args" style="opacity:.3">done</span>'}
    </div>`;
  }
  if (type === 'tool_error') {
    return `<div class="tool-event error">
      <span class="tool-bullet">✕</span>
      <span class="tool-name">${esc(tool)}</span>
      ${argsSpan}
    </div>`;
  }
  return '';
}

function appendToolEvent(type, tool, args) {
  const msgs = document.getElementById('messages');

  // On complete/error: update the last matching start row in-place instead of adding "null done"
  if (type === 'tool_complete' || type === 'tool_error') {
    const cls = type === 'tool_complete' ? 'complete' : 'error';
    const bullet = type === 'tool_complete' ? '✓' : '✕';
    // Find the last .tool-event.start that matches this tool (or just the last one if tool is null)
    const starts = msgs.querySelectorAll('.tool-event.start');
    let target = null;
    for (let i = starts.length - 1; i >= 0; i--) {
      const nameEl = starts[i].querySelector('.tool-name');
      if (!tool || (nameEl && nameEl.textContent === tool)) { target = starts[i]; break; }
    }
    if (target) {
      target.classList.remove('start');
      target.classList.add(cls);
      target.querySelector('.tool-bullet').textContent = bullet;
      msgs.scrollTop = msgs.scrollHeight;
      return;
    }
    // If no matching start found and tool name is null/empty, skip the row entirely
    if (!tool) return;
  }

  const html = toolEventHTML(type, tool, args);
  if (!html) return;
  const el   = document.createElement('div');
  el.innerHTML = html;
  msgs.appendChild(el.firstElementChild);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Streaming ─────────────────────────────────────────────────────────────────
function createStreamingMessage() {
  const msgs = document.getElementById('messages');
  msgs.querySelector('#empty-state')?.remove();
  const el = document.createElement('div');
  el.className = 'msg agent streaming'; el.id = 'streaming-msg';
  el.innerHTML = `<div class="msg-avatar">AI</div><div class="msg-body"><div class="msg-role">Agent</div><div class="msg-text"></div></div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}
function appendToStream(c) {
  const el = document.getElementById('streaming-msg');
  if (!el) return;
  el.querySelector('.msg-text').textContent += c;
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}
function finalizeStream(full) {
  const el = document.getElementById('streaming-msg');
  if (!el) return;
  el.classList.remove('streaming'); el.id = '';
  const s = getSess(activeId);
  s.messages.push({ role: 'agent', text: full });
  document.getElementById('msg-count').textContent = s.messages.length + ' msg';
  save();
}

// ── Send ──────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input  = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const text   = input.value.trim();
  if (!text || !activeId) return;

  const s   = getSess(activeId);
  const ep  = document.getElementById('endpoint-url').value.trim();
  const sep = ep.replace('/chat', '/chat/stream');

  input.value = ''; input.style.height = 'auto';
  sendBtn.disabled = true; input.disabled = true;
  appendMessage('user', text);
  if (isTouch()) input.blur();

  try {
    const body = {
      message: text,
      history: s.messages.slice(0, -1),
      agents:  s.agents  || [],
      skills:  s.skills  || [],
      mcps:    s.mcps    || [],
      ui_session_id: s.id,
    };
    if (s.resumedFrom) body.resumed_session_id = s.resumedFrom;

    const res = await fetch(sep, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let started = false, full = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of decoder.decode(value, { stream: true }).split('\n')) {
        if (!line.startsWith('data: ')) continue;
        try {
          const ev = JSON.parse(line.slice(6));
          if (ev.type === 'delta') {
            if (!started) { started = true; createStreamingMessage(); }
            full += ev.content; appendToStream(ev.content);
          }
          else if (ev.type === 'tool_start')
            appendToolEvent('tool_start',   ev.tool, ev.args ?? ev.input ?? null);
          else if (ev.type === 'tool_complete')
            appendToolEvent('tool_complete', ev.tool, ev.result ?? null);
          else if (ev.type === 'tool_error')
            appendToolEvent('tool_error',   ev.tool, ev.error ?? null);
          else if (ev.type === 'error')
            showError(ev.message);
          else if (ev.type === 'done') {
            if (!started && ev.content) appendMessage('agent', ev.content);
            else finalizeStream(full);
          }
        } catch (_) {}
      }
    }

    pingEndpoint();
    if (!s.configLocked) { s.configLocked = true; save(); renderConfigBar(); }

  } catch (err) {
    showError(err.message.includes('Failed to fetch')
      ? 'Cannot reach agent — is Flask running?'
      : 'Error: ' + err.message);
  } finally {
    sendBtn.disabled = false; input.disabled = false;
    if (!isTouch()) input.focus();
  }
}

// ── Toast / Ping ──────────────────────────────────────────────────────────────
let toastT;
function showError(msg) {
  const t = document.getElementById('error-toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 4000);
}
async function pingEndpoint() {
  const dot = document.getElementById('endpoint-dot');
  const url = document.getElementById('endpoint-url').value.trim();
  try {
    await fetch(url.replace('/chat', '/health'), {
      method: 'GET', headers: { 'ngrok-skip-browser-warning': '1' },
      signal: AbortSignal.timeout(2000)
    });
    dot.classList.add('live');
  } catch { dot.classList.remove('live'); }
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
document.getElementById('endpoint-url').addEventListener('change', pingEndpoint);

// close dropdowns on outside click / tap
const closeDD = e => {
  if (!e.target.closest('#agent-sel')) document.getElementById('agent-dd').classList.remove('open');
  if (!e.target.closest('#skill-sel')) document.getElementById('skill-dd').classList.remove('open');
  if (!e.target.closest('#mcp-sel'))   document.getElementById('mcp-dd').classList.remove('open');
};
document.addEventListener('click', closeDD);
document.addEventListener('touchstart', closeDD, { passive: true });

// ── Local Sessions ────────────────────────────────────────────────────────────
async function fetchLocalSessions() {
  const btn  = document.getElementById('fetch-local-btn');
  const base = document.getElementById('endpoint-url').value.trim().replace(/\/chat\/?$/, '');
  btn.disabled = true; btn.textContent = 'Fetching…';
  try {
    const r = await fetch(base + '/local-sessions/fetch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
      body: JSON.stringify({ limit: 50 })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    await loadLocalSessions();
    btn.textContent = `✓ ${d.fetched||0} fetched`;
    setTimeout(resetFetchBtn, 3000);
  } catch (err) {
    showError('Failed: ' + err.message); resetFetchBtn();
  } finally { btn.disabled = false; }
}
function resetFetchBtn() {
  document.getElementById('fetch-local-btn').innerHTML =
    `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
       <polyline points="8 17 12 21 16 17"/><line x1="12" y1="21" x2="12" y2="3"/>
     </svg> Fetch Local Sessions`;
}

async function loadLocalSessions(silent = false) {
  const base = document.getElementById('endpoint-url').value.trim().replace(/\/chat\/?$/, '');
  try {
    const r = await fetch(base + '/local-sessions', {
      headers: { 'ngrok-skip-browser-warning': '1' }, signal: AbortSignal.timeout(3000)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    localSessions = (await r.json()).sessions || [];
    renderLocalSessions();
  } catch (err) { if (!silent) showError('Failed: ' + err.message); }
}

function renderLocalSessions() {
  const container = document.getElementById('local-sessions-container');
  const list      = document.getElementById('local-sessions-list');
  if (!localSessions.length) { container.style.display = 'none'; return; }
  container.style.display = 'block';
  list.innerHTML = localSessions.map(s => `
    <div class="local-item ${s.sessionId===activeLocalId?'active':''}"
         onclick="selectLocalSession('${s.sessionId}')" title="${esc(s.summary||'')}">
      <div class="local-summary">${esc(s.summary||'Untitled session')}</div>
      <div class="local-meta">${s.startTimeLocal||''} ${s.repository?'· '+s.repository:''}</div>
    </div>`).join('');
}

async function selectLocalSession(id) {
  const base = document.getElementById('endpoint-url').value.trim().replace(/\/chat\/?$/, '');
  activeLocalId = id; renderLocalSessions();
  try {
    const r = await fetch(base + '/local-sessions/' + id, { headers: { 'ngrok-skip-browser-warning': '1' } });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const sid = 'local_' + id.slice(0,8) + '_' + Date.now();
    sessions.unshift({ id: sid, label: '📂 ' + (d.summary||'Local Session'), messages: d.messages||[], resumedFrom: id, agents:[], skills:[], mcps:[], configLocked: false });
    save(); renderSidebar(); selectSession(sid);
  } catch (err) { showError('Failed: ' + err.message); }
}

// ── Agents & Skills ───────────────────────────────────────────────────────────
async function loadAgents() {
  const base = document.getElementById('endpoint-url').value.trim().replace(/\/chat\/?$/, '');
  try {
    const r = await fetch(base + '/agents', { headers: { 'ngrok-skip-browser-warning': '1' }, signal: AbortSignal.timeout(3000) });
    if (r.ok) availableAgents = (await r.json()).agents || [];
  } catch {}
}
async function loadSkills() {
  const base = document.getElementById('endpoint-url').value.trim().replace(/\/chat\/?$/, '');
  try {
    const r = await fetch(base + '/skills', { headers: { 'ngrok-skip-browser-warning': '1' }, signal: AbortSignal.timeout(3000) });
    if (r.ok) availableSkills = (await r.json()).skills || [];
  } catch {}
}
async function loadMcps() {
  const base = document.getElementById('endpoint-url').value.trim().replace(/\/chat\/?$/, '');
  try {
    const r = await fetch(base + '/mcps', { headers: { 'ngrok-skip-browser-warning': '1' }, signal: AbortSignal.timeout(3000) });
    if (r.ok) availableMcps = (await r.json()).mcps || [];
  } catch {}
}

function renderConfigBar() {
  const s = getSess(activeId); if (!s) return;
  renderAgentOpts(); renderSkillOpts(); renderMcpOpts(); renderPills(); updateTriggers(); renderHeaderConfig(s);
}

function renderHeaderConfig(s) {
  const el = document.getElementById('session-config');
  if (!s) { el.innerHTML = ''; return; }
  let html = '';
  (s.agents||[]).forEach(slug => {
    const a = availableAgents.find(x=>x.slug===slug);
    html += `<span class="hcfg-pill agent">@${esc(a?.display_name||slug)}</span>`;
  });
  (s.skills||[]).forEach(slug => {
    const sk = availableSkills.find(x=>x.slug===slug);
    html += `<span class="hcfg-pill skill">#${esc(sk?.name||slug)}</span>`;
  });
  (s.mcps||[]).forEach(slug => {
    const m = availableMcps.find(x=>x.slug===slug);
    html += `<span class="hcfg-pill mcp">⚡${esc(m?.name||slug)}</span>`;
  });
  el.innerHTML = html;
}

function renderAgentOpts() {
  const s = getSess(activeId), sel = s?.agents||[], locked = s?.configLocked||false;
  const el = document.getElementById('agent-opts');
  if (!availableAgents.length) { el.innerHTML = '<div class="cfg-empty">No agents found</div>'; return; }
  el.innerHTML = availableAgents.map(a => {
    const on = sel.includes(a.slug);
    return `<div class="cfg-opt ${on?'sel':''} ${locked?'locked':''}" onclick="${locked?'':` toggleAgent('${a.slug}')`}">
      <div class="cfg-chk">${on?'✓':''}</div>
      <div class="cfg-info"><div class="cfg-name">@${esc(a.display_name||a.slug)}</div><div class="cfg-desc">${esc(a.description||'')}</div></div>
    </div>`;
  }).join('');
}

function renderSkillOpts() {
  const s = getSess(activeId), sel = s?.skills||[], locked = s?.configLocked||false;
  const el = document.getElementById('skill-opts');
  if (!availableSkills.length) { el.innerHTML = '<div class="cfg-empty">No skills found</div>'; return; }
  el.innerHTML = availableSkills.map(sk => {
    const on = sel.includes(sk.slug);
    return `<div class="cfg-opt ${on?'sel':''} ${locked?'locked':''}" onclick="${locked?'':` toggleSkill('${sk.slug}')`}">
      <div class="cfg-chk">${on?'✓':''}</div>
      <div class="cfg-info"><div class="cfg-name">#${esc(sk.name||sk.slug)}</div><div class="cfg-desc">${esc(sk.description||'')}</div></div>
    </div>`;
  }).join('');
}

function toggleAgent(slug) {
  const s = getSess(activeId); if (!s||s.configLocked) return;
  if (!s.agents) s.agents = [];
  const i = s.agents.indexOf(slug); if (i>=0) s.agents.splice(i,1); else s.agents.push(slug);
  save(); renderAgentOpts(); renderPills(); updateTriggers(); renderHeaderConfig(s);
}
function toggleSkill(slug) {
  const s = getSess(activeId); if (!s||s.configLocked) return;
  if (!s.skills) s.skills = [];
  const i = s.skills.indexOf(slug); if (i>=0) s.skills.splice(i,1); else s.skills.push(slug);
  save(); renderSkillOpts(); renderPills(); updateTriggers(); renderHeaderConfig(s);
}
function removeAgent(slug) {
  const s = getSess(activeId); if (!s||s.configLocked) return;
  s.agents = (s.agents||[]).filter(x=>x!==slug);
  save(); renderAgentOpts(); renderPills(); updateTriggers(); renderHeaderConfig(s);
}
function removeSkill(slug) {
  const s = getSess(activeId); if (!s||s.configLocked) return;
  s.skills = (s.skills||[]).filter(x=>x!==slug);
  save(); renderSkillOpts(); renderPills(); updateTriggers(); renderHeaderConfig(s);
}

function renderMcpOpts() {
  const s = getSess(activeId), sel = s?.mcps||[], locked = s?.configLocked||false;
  const el = document.getElementById('mcp-opts');
  if (!availableMcps.length) { el.innerHTML = '<div class="cfg-empty">No MCP servers found</div>'; return; }
  el.innerHTML = availableMcps.map(m => {
    const on = sel.includes(m.slug);
    return `<div class="cfg-opt ${on?'sel':''} ${locked?'locked':''}" onclick="${locked?'':` toggleMcp('${m.slug}')`}">
      <div class="cfg-chk">${on?'✓':''}</div>
      <div class="cfg-info"><div class="cfg-name">⚡ ${esc(m.name||m.slug)}</div><div class="cfg-desc">${esc(m.description||'')}</div></div>
    </div>`;
  }).join('');
}
function toggleMcp(slug) {
  const s = getSess(activeId); if (!s||s.configLocked) return;
  if (!s.mcps) s.mcps = [];
  const i = s.mcps.indexOf(slug); if (i>=0) s.mcps.splice(i,1); else s.mcps.push(slug);
  save(); renderMcpOpts(); renderPills(); updateTriggers(); renderHeaderConfig(s);
}
function removeMcp(slug) {
  const s = getSess(activeId); if (!s||s.configLocked) return;
  s.mcps = (s.mcps||[]).filter(x=>x!==slug);
  save(); renderMcpOpts(); renderPills(); updateTriggers(); renderHeaderConfig(s);
}

function renderPills() {
  const s = getSess(activeId); const el = document.getElementById('cfg-pills');
  if (!s) { el.innerHTML = ''; return; }
  const locked = s.configLocked||false;
  let html = '';
  (s.agents||[]).forEach(slug => {
    const a = availableAgents.find(x=>x.slug===slug);
    html += `<span class="cfg-pill agent ${locked?'locked':''}">@${esc(a?.display_name||slug)}<span class="px" onclick="removeAgent('${slug}')">×</span></span>`;
  });
  (s.skills||[]).forEach(slug => {
    const sk = availableSkills.find(x=>x.slug===slug);
    html += `<span class="cfg-pill skill ${locked?'locked':''}">@${esc(sk?.name||slug)}<span class="px" onclick="removeSkill('${slug}')">×</span></span>`;
  });
  (s.mcps||[]).forEach(slug => {
    const m = availableMcps.find(x=>x.slug===slug);
    html += `<span class="cfg-pill mcp ${locked?'locked':''}">⚡${esc(m?.name||slug)}<span class="px" onclick="removeMcp('${slug}')">×</span></span>`;
  });
  el.innerHTML = html;
}

function updateTriggers() {
  const s = getSess(activeId);
  const agents = s?.agents||[], skills = s?.skills||[], mcps = s?.mcps||[], locked = s?.configLocked||false;
  const ab = document.querySelector('#agent-sel .cfg-trigger');
  const sb = document.querySelector('#skill-sel .cfg-trigger');
  const mb = document.querySelector('#mcp-sel .cfg-trigger');
  ab.classList.toggle('active', agents.length>0);
  sb.classList.toggle('active', skills.length>0);
  mb.classList.toggle('active', mcps.length>0);
  ab.classList.toggle('locked', locked);
  sb.classList.toggle('locked', locked);
  mb.classList.toggle('locked', locked);
  const ac = document.getElementById('agent-count');
  const sc = document.getElementById('skill-count');
  const mc = document.getElementById('mcp-count');
  ac.textContent = agents.length; ac.style.display = agents.length ? 'inline':'none';
  sc.textContent = skills.length; sc.style.display = skills.length ? 'inline':'none';
  mc.textContent = mcps.length;   mc.style.display = mcps.length   ? 'inline':'none';
}

function toggleDD(type) {
  const s = getSess(activeId); if (s?.configLocked) return;
  const add = document.getElementById('agent-dd');
  const sdd = document.getElementById('skill-dd');
  const mdd = document.getElementById('mcp-dd');
  if (type === 'agent') {
    const open = add.classList.contains('open');
    add.classList.toggle('open', !open); sdd.classList.remove('open'); mdd.classList.remove('open');
    if (!open) renderAgentOpts();
  } else if (type === 'skill') {
    const open = sdd.classList.contains('open');
    sdd.classList.toggle('open', !open); add.classList.remove('open'); mdd.classList.remove('open');
    if (!open) renderSkillOpts();
  } else {
    const open = mdd.classList.contains('open');
    mdd.classList.toggle('open', !open); add.classList.remove('open'); sdd.classList.remove('open');
    if (!open) renderMcpOpts();
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderSidebar();
renderChat(null);
pingEndpoint();
loadLocalSessions(true);
loadAgents();
loadSkills();
loadMcps();
setInterval(pingEndpoint, 30000);
</script>
</body>
